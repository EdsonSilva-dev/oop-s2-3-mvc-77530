name: ci-cd

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Publish MVC app
        run: dotnet publish VgcCollege.MVC/VgcCollege.MVC.csproj -c Release -o ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: mvc-publish
          path: ./publish

      - name: Upload test results and coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: ./TestResults

  deploy:
    name: deploy-production
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: build-test-coverage
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: mvc-publish
          path: ./publish

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: vgc-college-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
